name: Deploy Backend to Azure App Service

on:
  push:
    branches: [main]
    paths:
      - 'backend/**'

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      # 1. Checkout Repository
      - name: Checkout code
        uses: actions/checkout@v4

      # 2. Setup Node.js
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      # 3. Install dependencies
      - name: Install dependencies
        working-directory: ./backend
        run: npm ci

      # 4. Create deployment package
      - name: Build artifact
        working-directory: ./backend
        run: |
          zip -r ../backend-release.zip . \
            -x "node_modules/.cache/*" \
            -x ".env" \
            -x ".env.local"

      # 5. Upload artifact
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: backend-app
          path: backend-release.zip

      # 6. Deploy to Azure App Service (supports both secret naming conventions)
      - name: Deploy to Azure (AZURE_WEBAPP_* secrets)
        if: ${{ secrets.AZURE_WEBAPP_NAME != '' && secrets.AZURE_WEBAPP_PUBLISH_PROFILE != '' }}
        uses: azure/webapps-deploy@v3
        with:
          app-name: ${{ secrets.AZURE_WEBAPP_NAME }}
          publish-profile: ${{ secrets.AZURE_WEBAPP_PUBLISH_PROFILE }}
          package: backend-release.zip

      - name: Deploy to Azure (AZURE_APP_* secrets)
        if: ${{ secrets.AZURE_WEBAPP_PUBLISH_PROFILE == '' && secrets.AZURE_APP_NAME != '' && secrets.AZURE_PUBLISH_PROFILE != '' }}
        uses: azure/webapps-deploy@v3
        with:
          app-name: ${{ secrets.AZURE_APP_NAME }}
          publish-profile: ${{ secrets.AZURE_PUBLISH_PROFILE }}
          package: backend-release.zip
